id: analyze_body
description: Produce a content-analysis dict from the article body via four independent
  sub-analyses
interface:
  operations:
  - name: analyze
    inputs:
      body: string
    outputs:
      analysis: dict
    errors: []
dependencies: []
behavior:
- id: word_count
  prose: Count whitespace-separated words in body; store as analysis['word_count']
    (int).
- id: reading_level
  prose: Split body on '.' to get sentences; compute average words-per-sentence; store
    analysis['reading_level'] = 'easy' if average < 12 else 'hard'.
- id: top_keyword
  prose: Lowercase every word in body, count frequencies, pick the most frequent;
    break ties alphabetically; store as analysis['top_keyword'] (string).
- id: has_links
  prose: Store analysis['has_links'] = true if the substring 'http' appears anywhere
    in body, else false.
- id: independence
  prose: The four sub-analyses (word_count, reading_level, top_keyword, has_links)
    each concern a separate property of the body and do not depend on each other;
    they are combined into a single analysis dict as their only point of coupling.
