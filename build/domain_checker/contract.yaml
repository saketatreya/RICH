id: domain_checker
description: Check if email domain is a common provider (gmail, yahoo, outlook)
interface:
  operations:
  - name: is_common
    inputs:
      email: string
    outputs:
      common: bool
      domain: string
    errors: []
dependencies:
- name: regex
  id: regex_engine
behavior:
- id: common_providers
  prose: Returns common=true for gmail.com, yahoo.com, outlook.com domains
