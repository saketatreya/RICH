id: pipeline_demo
description: Normalize a string (strip whitespace, lowercase) then validate it (non-empty,
  no special chars)
interface:
  operations:
  - name: run
    inputs:
      text: string
    outputs:
      original: string
      normalized: string
      valid: bool
      reason: string
    errors: []
dependencies:
- name: normalizer
  id: normalizer
- name: validator
  id: validator
behavior:
- id: pipeline_order
  prose: Normalization happens before validation
- id: valid_output
  prose: If valid is true, reason must be 'OK'
