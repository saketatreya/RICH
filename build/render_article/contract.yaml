id: render_article
description: Assemble the final published record from title, body, and analysis
interface:
  operations:
  - name: render
    inputs:
      title: string
      body: string
      analysis: dict
    outputs:
      published: dict
    errors: []
dependencies: []
behavior:
- id: assemble
  prose: 'Build published dict with keys: title (from input), body (from input), analysis
    (from input), and summary = ''<title> (<word_count> words, <reading_level>)''
    where word_count and reading_level are drawn from analysis.'
