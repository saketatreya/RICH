id: validator
description: 'Validate a normalized string: non-empty, no special characters'
interface:
  operations:
  - name: validate
    inputs:
      text: string
    outputs:
      valid: bool
      reason: string
    errors: []
dependencies: []
behavior:
- id: non_empty
  prose: Empty strings are invalid
- id: no_special_chars
  prose: Strings with special characters other than letters/digits/spaces are invalid
