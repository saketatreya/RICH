id: format_checker
description: Check if an email has valid format (contains @, has domain part)
interface:
  operations:
  - name: check_format
    inputs:
      email: string
    outputs:
      valid: bool
    errors: []
dependencies:
- name: regex
  id: regex_engine
behavior:
- id: has_at
  prose: Email must contain exactly one @ sign
- id: has_domain
  prose: Domain part after @ must be non-empty
