name: token_store
version: 0.1.0

interface:
  operations:
    - name: issue
      inputs:
        subject: string
      outputs:
        token: string
      errors: []
    - name: validate
      inputs:
        token: string
      outputs:
        subject: string
      errors:
        - invalid_token
        - expired_token

dependencies: []

behavior:
  - id: token_validity_window
    prose: "Issued tokens validate for 24h from issue, then yield expired_token."
    formal: null
  - id: token_uniqueness
    prose: "Each call to issue produces a unique token."
    formal: null