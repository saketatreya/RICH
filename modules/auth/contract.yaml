name: auth
version: 0.1.0

interface:
  operations:
    - name: authenticate
      inputs:
        username: string
        password: string
      outputs:
        token: string
      errors:
        - invalid_credentials

dependencies:
  - user_repo
  - token_store

behavior:
  - id: token_on_success
    prose: "On valid credentials, returns a non-empty token."
    formal:
      kind: postcondition
      expr: "len(result.token) > 0"
  - id: reject_invalid
    prose: "On invalid credentials, raises invalid_credentials."
    formal:
      kind: raises
      errors:
        - invalid_credentials
