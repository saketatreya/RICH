name: user_repo
version: 0.1.0

interface:
  operations:
    - name: verify_password
      inputs:
        username: string
        password: string
      outputs:
        ok: bool
      errors:
        - unknown_user

dependencies: []

behavior:
  - id: correct_user_verified
    prose: "Correct password returns ok: true."
    formal:
      kind: postcondition
      expr: "result.ok == true"
  - id: constant_time_compare
    prose: "Passwords are never compared in plaintext; comparison is constant-time over a stored hash."
    formal:
      kind: nonfunctional
